name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_SECRETS: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_STORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" "cmake;3.22.1"

    - name: Install dependencies
      run: flutter pub get

    - name: Prepare release keystore
      if: env.HAS_RELEASE_SECRETS == 'true'
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        mkdir -p android/keystore
        echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore/upload-keystore.jks
        cat > android/key.properties <<EOF
        storePassword=$ANDROID_STORE_PASSWORD
        keyPassword=$ANDROID_KEY_PASSWORD
        keyAlias=$ANDROID_KEY_ALIAS
        storeFile=../keystore/upload-keystore.jks
        EOF

    - name: Build APK (release)
      if: env.HAS_RELEASE_SECRETS == 'true'
      run: flutter build apk --release --build-number=${{ github.run_number }}

    - name: Build APK (debug fallback for validation only)
      if: env.HAS_RELEASE_SECRETS != 'true'
      run: flutter build apk --debug --build-number=${{ github.run_number }}

    - name: Upload APK artifact (release)
      if: env.HAS_RELEASE_SECRETS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: curl-runner-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload APK artifact (debug)
      if: env.HAS_RELEASE_SECRETS != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: curl-runner-debug-apk
        path: build/app/outputs/flutter-apk/app-debug.apk

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v') && env.HAS_RELEASE_SECRETS == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        draft: false
        prerelease: false
